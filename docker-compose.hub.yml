services:
  driftlock:
    image: shinchangupta/driftlock:latest
    container_name: driftlock
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - SECRET_KEY=${SECRET_KEY:-changethisinproduction}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT:-changethisinproduction}
      - DOMAIN=${DOMAIN:-localhost}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    volumes:
      - driftlock_data:/app/data

volumes:
  driftlock_data:
