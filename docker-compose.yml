services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks: [ driftlock ]

  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - sqlite_data:/app/data
      - agent_builds:/app/agent_builds:ro
    env_file: .env
    restart: unless-stopped
    networks: [ driftlock ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    volumes:
      - frontend_build:/app/dist
    profiles: [ "build" ]

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    profiles: [ "certbot" ]
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  sqlite_data:
  certbot_certs:
  certbot_webroot:
  frontend_build:
  agent_builds:


networks:
  driftlock:
    driver: bridge
